{% extends 'base_simples.html' %}

{% block title %}Alterar senha{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="card auth-card auth-card-wide">
        <div class="auth-header">
            <span class="auth-badge">
                <i class="fas fa-key"></i>
                Seguranca da conta
            </span>
            <h1 class="auth-title">Alterar senha</h1>
            <p class="auth-subtitle">
                Confirme a senha atual e defina uma nova senha para a sua conta.
            </p>
        </div>

        <div class="auth-body">
            <form method="POST" class="row g-3">
                <div class="col-12">
                    <label for="senha_atual" class="auth-label">Senha atual</label>
                    <input type="password" class="form-control auth-input" id="senha_atual" name="senha_atual" required>
                </div>

                <div class="col-12">
                    <label for="nova_senha" class="auth-label">Nova senha</label>
                    <input type="password" class="form-control auth-input" id="nova_senha" name="nova_senha" placeholder="Minimo de 8 caracteres" required>
                </div>

                <div class="col-12">
                    <label for="confirmar_senha" class="auth-label">Confirmar nova senha</label>
                    <input type="password" class="form-control auth-input" id="confirmar_senha" name="confirmar_senha" required>
                </div>

                <div class="col-12 d-grid">
                    <button type="submit" class="btn auth-primary-btn text-white">Salvar nova senha</button>
                </div>
            </form>

            <div class="auth-divider">ou</div>

            <div class="text-center">
                <a href="{{ url_for('esqueci_senha') }}" class="auth-secondary-link">Esqueci minha senha</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
