<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaCasa - Area interna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top left, rgba(217, 119, 6, 0.18), transparent 24rem),
                linear-gradient(180deg, #fffefb 0%, #f6efe5 100%);
        }

        .cc-login-card {
            width: min(100%, 460px);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 28px 60px rgba(15, 23, 42, 0.1);
        }
    </style>
</head>
<body>
    <div class="cc-login-card p-4 p-lg-5">
        <div class="text-center mb-4">
            {% if config.logo_url %}
            <div class="mb-3">
                <img src="{{ config.logo_url }}" alt="{{ config.empresa_nome }}" style="max-width: 220px; max-height: 84px; object-fit: contain;">
            </div>
            {% endif %}
            <div class="small text-uppercase text-muted fw-bold mb-2">ConectaCasa</div>
            <h1 class="h3 mb-0">Area interna</h1>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="next" value="{{ proximo }}">
            <div class="mb-3">
                <label for="usuario" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="usuario" name="usuario" required autofocus>
            </div>
            <div class="mb-4">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" name="senha" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-dark rounded-pill py-2">Entrar</button>
                <a href="{{ conectacasa_path('/') }}" class="btn btn-outline-secondary rounded-pill py-2">Voltar para o site</a>
            </div>
        </form>
    </div>
</body>
</html>
