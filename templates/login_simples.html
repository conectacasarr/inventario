{% extends 'base_simples.html' %}

{% block title %}Login - OAIBV{% endblock %}

{% block content %}
<div class="container login-container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow" style="width: 400px; max-width: 100%;">
        <div class="card-header text-center bg-primary text-white">
            <h3 style="font-weight: bold; margin-bottom: 5px;">Inventário - OAIBV</h3>
            <p style="font-size: 14px; margin-bottom: 0;">Organização e Apoio à Igreja em Boa Vista</p>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-4">
                    <label for="usuario" class="form-label">Usuário</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" required>
                </div>
                <div class="mb-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .login-container {
        background-color: #f8f9fa;
    }
    .card {
        border-radius: 10px;
        overflow: hidden;
    }
    .card-header {
        padding: 1.5rem 1rem;
    }
    .btn-primary {
        background-color: #0d6efd;
        border-color: #0d6efd;
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        background-color: #0b5ed7;
        border-color: #0a58ca;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
</style>
{% endblock %}
