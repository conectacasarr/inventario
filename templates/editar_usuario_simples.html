{% extends 'base_simples.html' %}

{% block title %}Editar Usuario - OAIBV{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Editar Usuario</h2>

    <div class="card">
        <div class="card-header">
            <h5>Formulario de Edicao</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="{{ usuario.nome }}" required>
                </div>
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" value="{{ usuario.usuario }}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ usuario.email or '' }}" required>
                </div>
                <div class="mb-3">
                    <label for="senha" class="form-label">Senha (deixe em branco para manter a atual)</label>
                    <input type="password" class="form-control" id="senha" name="senha">
                </div>
                <div class="mb-3">
                    <label for="tipo" class="form-label">Tipo</label>
                    <select class="form-control" id="tipo" name="tipo" required>
                        <option value="comum" {% if usuario.tipo == 'comum' %}selected{% endif %}>Comum</option>
                        <option value="admin" {% if usuario.tipo == 'admin' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>
                <div class="card border-0 bg-light-subtle mb-3">
                    <div class="card-body">
                        <h6 class="mb-3">Permissoes</h6>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="pode_acessar_inventario" name="pode_acessar_inventario" value="1" {% if usuario.pode_acessar_inventario %}checked{% endif %}>
                            <label class="form-check-label" for="pode_acessar_inventario">
                                Liberar acesso ao inventario
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="pode_editar_igreja" name="pode_editar_igreja" value="1" {% if usuario.pode_editar_igreja %}checked{% endif %}>
                            <label class="form-check-label" for="pode_editar_igreja">
                                Liberar edicao do portal da igreja
                            </label>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Voltar</a>
                    <button type="submit" class="btn btn-primary">Atualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
