{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h1 class="mb-4">Editar Usuário</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="form-container">
            <form method="POST" action="{{ url_for('editar_usuario', id=usuario.id) }}">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input type="text" class="form-control" id="nome" name="nome" 
                           value="{{ usuario.nome }}" required>
                </div>
                
                <div class="form-group">
                    <label for="usuario">Nome de Usuário *</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" 
                           value="{{ usuario.usuario }}" required>
                    <small class="form-text text-muted">Nome de usuário para login no sistema.</small>
                </div>
                
                <div class="form-group">
                    <label for="senha">Nova Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha">
                    <small class="form-text text-muted">Deixe em branco para manter a senha atual.</small>
                </div>
                
                <div class="form-group">
                    <label for="confirmar_senha">Confirmar Nova Senha</label>
                    <input type="password" class="form-control" id="confirmar_senha" name="confirmar_senha">
                </div>
                
                <div class="form-group">
                    <label>Tipo de Usuário *</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipo" id="tipo_comum" value="comum"
                               {% if usuario.tipo == 'comum' %}checked{% endif %}>
                        <label class="form-check-label" for="tipo_comum">
                            Comum
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipo" id="tipo_admin" value="admin"
                               {% if usuario.tipo == 'admin' %}checked{% endif %}>
                        <label class="form-check-label" for="tipo_admin">
                            Administrador
                        </label>
                    </div>
                </div>
                
                <div class="form-group mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Salvar Alterações
                    </button>
                    <a href="{{ url_for('usuarios') }}" class="btn btn-secondary ml-2">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
